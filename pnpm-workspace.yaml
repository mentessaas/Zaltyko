packages:
  - .

allowBuilds:
  '@scarf/scarf': true
  '@sentry/cli': true
  '@tree-sitter-grammars/tree-sitter-yaml': true
  '@vercel/speed-insights': true
  core-js: true
  core-js-pure: true
  esbuild: true
  protobufjs: true
  sharp: true
  tree-sitter: true
  tree-sitter-json: true
  unrs-resolver: true

overrides:
  "@types/react": 18.3.12
  "@types/react-dom": 18.3.5
  ws: ^8.21.0
  path-to-regexp: ^8.4.0
  protobufjs: ^7.5.6
  lodash: ^4.18.1
  immutable: ^3.8.3
  form-data: ^4.0.6

onlyBuiltDependencies:
  - "@scarf/scarf"
  - "@sentry/cli"
  - "@tree-sitter-grammars/tree-sitter-yaml"
  - "@vercel/speed-insights"
  - core-js
  - core-js-pure
  - esbuild
  - protobufjs
  - sharp
  - tree-sitter
  - tree-sitter-json
  - unrs-resolver
